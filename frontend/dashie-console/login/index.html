<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashie Console — Signing In</title>
    <style>
        body {
            margin: 0;
            background: #fafafa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #111827;
        }
        .loading {
            text-align: center;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e5e7eb;
            border-top-color: #f97316;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error { color: #ef4444; display: none; margin-top: 12px; }
    </style>
</head>
<body>
    <div class="loading">
        <div class="spinner"></div>
        <div>Completing sign-in...</div>
        <div class="error" id="error"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="../js/lib/console-auth.js"></script>
    <script>
        // OAuth callback handler. Google redirects here with ?code=...&state=...
        // Exchange code, bootstrap JWT, redirect back to console root.
        (async function() {
            try {
                const params = new URLSearchParams(window.location.search);
                if (!params.has('code')) {
                    window.location.href = '../';
                    return;
                }

                await DashieAuth._handleOAuthCallback(params);

                // Redirect to console root (one level up from /login/)
                window.location.href = '../';
            } catch (e) {
                console.error('Sign-in failed:', e);
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = e.message;
            }
        })();
    </script>
</body>
</html>
