name: Dashie Console (Dev)
version: "0.1.203"
slug: dashie_dev
description: Dashie Console (Dev channel — tracks dashie-console main). For testing before a prod cut; install alongside the stable "Dashie Console" add-on.
url: https://github.com/jwlerch78/dashie-ha-app
arch:
  - aarch64
  - amd64
  - armv7

# HA permissions we need
hassio_api: true                # Access to Supervisor (env: $SUPERVISOR_TOKEN)
homeassistant_api: true         # Access to HA REST API
homeassistant: "2024.1.0"       # Min HA version (any recent HA is fine)

# Persistent storage for /data (JWT, service token, config cache).
# addon_config:rw — the add-on's OWN private config folder, surfaced to HA Core at
# /config/addon_configs/dashie/ (readable by the Dashie integration, NOT by other add-ons).
# Used to hand the integration the internal-bridge secret. Build plan 20260702_BRIDGE_AUTH_HARDENING.md.
map:
  - data:rw
  - addon_config:rw

# Ingress: HA serves the UI at /api/hassio_ingress/<token>/
# The add-on listens on port 8099 internally; HA proxies external traffic to it.
ingress: true
ingress_port: 8099
# Intentionally NOT setting ingress_entry — defaulting to '/'. Setting it to '/'
# explicitly causes HA to concatenate a double-slash onto the Ingress URL
# (e.g. /api/hassio_ingress/<token>//), which breaks relative-path routing
# inside the SPA.
# HAOS panel icons can only be Material Design Icons (mdi:...) — not custom images.
# home-heart is the closest family-dashboard vibe available.
panel_icon: mdi:home-heart
panel_title: Dashie Console (Dev)

# No external ports exposed — everything flows through Ingress.
ports: {}

# User-configurable settings shown in the add-on's Configuration tab.
# `supabase_env`: 'production' (live Dashie accounts) or 'development' (dev.dashieapp.com testing).
# `log_level`: verbosity of add-on logs.
options:
  supabase_env: development
  log_level: info
  bridge_auth_enforce: false
schema:
  supabase_env: list(production|development)
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  # Reject internal add-on↔integration calls lacking the shared bridge secret. Keep OFF until
  # both the add-on and integration are updated + the secret channel is verified, then flip ON.
  bridge_auth_enforce: bool?
